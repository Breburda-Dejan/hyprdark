##############################################################################
#  hyprdark — Hyprland config (Catppuccin Mocha)
#  Docs: https://wiki.hyprland.org
##############################################################################

# ── Monitors ────────────────────────────────────────────────────────────────
# Sensible default: native resolution, auto position, scale 1.
# Per-machine overrides live in machine.conf (generated by the installer).
monitor = , preferred, auto, 1

# ── Autostart ───────────────────────────────────────────────────────────────
exec-once = hyprpaper
exec-once = waybar
exec-once = hypridle
exec-once = dunst
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = sh -c 'command -v nm-applet >/dev/null && nm-applet'
exec-once = hyprctl setcursor Adwaita 24

# ── Environment ─────────────────────────────────────────────────────────────
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# ── Look & feel ─────────────────────────────────────────────────────────────
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(cba6f7ee) rgba(b4befeee) 45deg   # mauve → lavender
    col.inactive_border = rgba(45475aaa)                       # surface1
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(11111baa)
    }
}

animations {
    enabled = true
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = pop,    0.34, 1.2, 0.64, 1.0

    animation = windows,     1, 4, pop,    slide
    animation = windowsOut,  1, 4, smooth, slide
    animation = fade,        1, 4, smooth
    animation = border,      1, 6, smooth
    animation = workspaces,  1, 4, smooth, slide
    animation = layers,      1, 3, smooth, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    focus_on_activate = true
}

# ── Input ───────────────────────────────────────────────────────────────────
input {
    kb_layout = us          # ← change to your layout (e.g. de, at, fr)
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# ── Keybinds ────────────────────────────────────────────────────────────────
$mod  = SUPER
$term = alacritty
$menu = rofi -show drun
$files = thunar

# Apps & session
bind = $mod, Return, exec, $term
bind = $mod, Space,  exec, $menu
bind = $mod, Tab,    exec, rofi -show window
bind = $mod, E,      exec, $files
bind = $mod, V,      exec, ~/.config/hypr/scripts/clipboard.sh
bind = $mod ALT, L,  exec, hyprlock
bind = $mod, Escape, exec, wlogout -b 5 -T 400 -B 400

# Window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, Space, togglefloating
bind = $mod, P, pseudo
bind = $mod, T, togglesplit

# Focus (arrows + vim keys)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize
binde = $mod CTRL, left,  resizeactive, -40 0
binde = $mod CTRL, right, resizeactive,  40 0
binde = $mod CTRL, up,    resizeactive,  0 -40
binde = $mod CTRL, down,  resizeactive,  0  40

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Scratchpad (special workspace)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod ALT, S, movetoworkspace, special:magic

# Mouse: move / resize
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshots (grim + slurp → clipboard + ~/Pictures/Screenshots)
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot.sh area

# Media & volume (works on any keyboard with media keys)
bindl  = , XF86AudioPlay,  exec, playerctl play-pause
bindl  = , XF86AudioNext,  exec, playerctl next
bindl  = , XF86AudioPrev,  exec, playerctl previous
bindle = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume.sh up
bindle = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume.sh down
bindl  = , XF86AudioMute,        exec, ~/.config/hypr/scripts/volume.sh mute
bindle = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness.sh up
bindle = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# ── Window rules ────────────────────────────────────────────────────────────
windowrule = float, class:^(pavucontrol)$
windowrule = float, class:^(nm-connection-editor)$
windowrule = float, class:^(blueman-manager)$
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save As)$
windowrule = suppressevent maximize, class:.*

layerrule = blur, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications
layerrule = ignorezero, notifications
layerrule = blur, logout_dialog

# ── Machine-specific (generated by installer: laptop lid, NVIDIA, …) ───────
source = ~/.config/hypr/machine.conf
