# hyprdark — hypridle
# Lock after 5 min, screen off after 8 min.
# On laptops the installer adds a suspend listener below.

general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid multiple instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend (incl. lid close)
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}

listener {
    timeout = 300                               # 5 min → lock
    on-timeout = loginctl lock-session
}

listener {
    timeout = 480                               # 8 min → screen off
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({ action = "off" })'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({ action = "on" })'
}

#__SUSPEND_LISTENER__
