# hyprdark — hyprlock (monochrome)

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot          # blur whatever was on screen
    blur_passes = 3
    blur_size = 8
    noise = 0.012
    brightness = 0.45
    vibrancy = 0.0
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(232, 232, 232, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(154, 154, 154, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text =    $USER
    color = rgba(200, 200, 200, 1.0)
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(232, 232, 232, 0.9)
    inner_color = rgba(10, 10, 10, 0.9)
    font_color = rgba(232, 232, 232, 1.0)
    check_color = rgba(154, 154, 154, 0.9)
    fail_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##9a9a9a">password…</span>
    hide_input = false
    rounding = 12
    position = 0, -150
    halign = center
    valign = center
}

