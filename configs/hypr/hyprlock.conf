# hyprdark — hyprlock (Catppuccin Mocha)

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = screenshot          # blur whatever was on screen
    blur_passes = 3
    blur_size = 8
    noise = 0.012
    brightness = 0.55
    vibrancy = 0.15
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(205, 214, 244, 1.0)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(166, 173, 200, 1.0)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text =    $USER
    color = rgba(180, 190, 254, 1.0)
    font_size = 15
    font_family = JetBrainsMono Nerd Font
    position = 0, -80
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(203, 166, 247, 0.9)     # mauve
    inner_color = rgba(30, 30, 46, 0.9)        # base
    font_color = rgba(205, 214, 244, 1.0)      # text
    check_color = rgba(249, 226, 175, 0.9)     # yellow while checking
    fail_color = rgba(243, 139, 168, 0.9)      # red on fail
    fade_on_empty = false
    placeholder_text = <span foreground="##a6adc8">password…</span>
    hide_input = false
    rounding = 12
    position = 0, -150
    halign = center
    valign = center
}
