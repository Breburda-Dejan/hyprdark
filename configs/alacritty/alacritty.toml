# hyprdark — Alacritty (Catppuccin Mocha)

[window]
padding = { x = 12, y = 12 }
opacity = 0.96
dynamic_padding = true
decorations = "None"

[scrolling]
history = 10000

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold   = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
size = 11.5

[cursor]
style = { shape = "Beam", blinking = "On" }
thickness = 0.2

[colors.primary]
background = "#0a0a0a"
foreground = "#e6e6e6"
dim_foreground = "#8a8a8a"
bright_foreground = "#ffffff"

[colors.cursor]
text = "#0a0a0a"
cursor = "#ffffff"

[colors.selection]
text = "#0a0a0a"
background = "#e6e6e6"

[colors.search.matches]
foreground = "#0a0a0a"
background = "#9a9a9a"

[colors.search.focused_match]
foreground = "#0a0a0a"
background = "#ffffff"

[colors.hints.start]
foreground = "#0a0a0a"
background = "#e6e6e6"

[colors.hints.end]
foreground = "#0a0a0a"
background = "#8a8a8a"

[colors.normal]
black   = "#2a2a2a"
red     = "#bf8a8a"
green   = "#9db08f"
yellow  = "#cfc9a3"
blue    = "#8fa3b8"
magenta = "#b39ab3"
cyan    = "#93b3ad"
white   = "#c9c9c9"

[colors.bright]
black   = "#4a4a4a"
red     = "#d4a3a3"
green   = "#b3c4a6"
yellow  = "#e0dabb"
blue    = "#a8bccf"
magenta = "#c7b0c7"
cyan    = "#abc9c3"
white   = "#f0f0f0"
